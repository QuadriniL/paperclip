<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Option C — "Kickoff chat" (momentum-framed, chat preview). Desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <rect x="0" y="0" width="1280" height="800" fill="#e6e6e6" stroke="none" />
  <text x="24" y="32" font-size="12" stroke="none" fill="#666">Modal overlay — app dimmed behind</text>

  <g transform="translate(360,120)">
    <rect width="560" height="560" rx="8" fill="#fff" />

    <!-- close X -->
    <g stroke="#000" stroke-width="1.5">
      <line x1="24" y1="24" x2="36" y2="36" />
      <line x1="36" y1="24" x2="24" y2="36" />
    </g>

    <!-- stepper tabs -->
    <line x1="24" y1="88" x2="536" y2="88" stroke="#000" stroke-width="1" />
    <text x="24"  y="80" font-size="12" stroke="none" fill="#666">Mission</text>
    <text x="112" y="80" font-size="12" stroke="none" fill="#666">Team lead</text>
    <text x="216" y="80" font-size="12" stroke="none" fill="#000">Kickoff</text>
    <line x1="216" y1="88" x2="272" y2="88" stroke="#000" stroke-width="2.5" />

    <!-- heading -->
    <text x="280" y="132" font-size="28" text-anchor="middle" stroke="none" fill="#000">Let&#8217;s plan your team</text>
    <text x="280" y="156" font-size="14" text-anchor="middle" stroke="none" fill="#000">{agentName} is ready. Talk through your goal and</text>
    <text x="280" y="176" font-size="14" text-anchor="middle" stroke="none" fill="#000">decide who to bring on.</text>

    <!-- chat preview panel -->
    <g transform="translate(40,208)">
      <rect width="480" height="160" rx="8" fill="#fff" stroke="#000" />
      <text x="16" y="24" font-size="12" stroke="none" fill="#666">PREVIEW</text>

      <!-- lead avatar + name -->
      <circle cx="40" cy="64" r="16" fill="#e6e6e6" stroke="#000" />
      <circle cx="40" cy="58" r="6" fill="#fff" stroke="#000" />
      <path d="M30 76 a10 10 0 0 1 20 0" fill="#fff" stroke="#000" />
      <text x="68" y="56" font-size="12" stroke="none" fill="#000">{agentName}</text>
      <text x="68" y="70" font-size="12" stroke="none" fill="#666">team lead</text>

      <!-- incoming chat bubble -->
      <rect x="68" y="72" width="384" height="64" rx="8" fill="#e6e6e6" stroke="#000" />
      <text x="84" y="96"  font-size="14" stroke="none" fill="#000">Hi — I&#8217;m {agentName}. Let&#8217;s turn &#8220;{companyGoal}&#8221;</text>
      <text x="84" y="116" font-size="14" stroke="none" fill="#000">into a plan. Who should we hire first?</text>
    </g>

    <!-- helper line -->
    <text x="280" y="408" font-size="12" text-anchor="middle" stroke="none" fill="#666">You stay in control — nothing happens until you say so.</text>

    <!-- footer -->
    <text x="24" y="520" font-size="14" stroke="none" fill="#666">&#8592; Back</text>
    <g transform="translate(288,496)">
      <rect width="248" height="40" rx="4" fill="#fff" stroke="#000" />
      <path d="M20 14 h20 a4 4 0 0 1 4 4 v8 a4 4 0 0 1 -4 4 h-10 l-6 5 v-5 h-4 a4 4 0 0 1 -4 -4 v-8 a4 4 0 0 1 4 -4 z" fill="#fff" stroke="#000" />
      <text x="136" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#000">Open chat with {agentName}</text>
    </g>
  </g>
</svg>

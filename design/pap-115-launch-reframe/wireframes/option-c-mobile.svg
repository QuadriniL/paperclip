<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Option C mobile — kickoff chat preview. 375x812 -->
  <rect x="0" y="0" width="375" height="812" />

  <g stroke="#000" stroke-width="1.5">
    <line x1="24" y1="32" x2="36" y2="44" />
    <line x1="36" y1="32" x2="24" y2="44" />
  </g>

  <line x1="24" y1="96" x2="351" y2="96" stroke="#000" stroke-width="1" />
  <text x="24"  y="88" font-size="12" stroke="none" fill="#666">Mission</text>
  <text x="104" y="88" font-size="12" stroke="none" fill="#666">Lead</text>
  <text x="160" y="88" font-size="12" stroke="none" fill="#000">Kickoff</text>
  <line x1="160" y1="96" x2="216" y2="96" stroke="#000" stroke-width="2.5" />

  <text x="32" y="156" font-size="28" stroke="none" fill="#000">Let&#8217;s plan</text>
  <text x="32" y="188" font-size="28" stroke="none" fill="#000">your team</text>
  <text x="32" y="216" font-size="14" stroke="none" fill="#000">{agentName} is ready. Talk through your</text>
  <text x="32" y="236" font-size="14" stroke="none" fill="#000">goal and decide who to bring on.</text>

  <!-- chat preview -->
  <g transform="translate(32,272)">
    <rect width="311" height="184" rx="8" fill="#fff" stroke="#000" />
    <text x="16" y="24" font-size="12" stroke="none" fill="#666">PREVIEW</text>
    <circle cx="36" cy="64" r="16" fill="#e6e6e6" stroke="#000" />
    <circle cx="36" cy="58" r="6" fill="#fff" stroke="#000" />
    <path d="M26 76 a10 10 0 0 1 20 0" fill="#fff" stroke="#000" />
    <text x="64" y="56" font-size="12" stroke="none" fill="#000">{agentName}</text>
    <text x="64" y="70" font-size="12" stroke="none" fill="#666">team lead</text>
    <rect x="16" y="80" width="279" height="88" rx="8" fill="#e6e6e6" stroke="#000" />
    <text x="32" y="108" font-size="14" stroke="none" fill="#000">Hi — I&#8217;m {agentName}. Let&#8217;s turn</text>
    <text x="32" y="130" font-size="14" stroke="none" fill="#000">&#8220;{companyGoal}&#8221; into a plan.</text>
    <text x="32" y="152" font-size="14" stroke="none" fill="#000">Who should we hire first?</text>
  </g>

  <text x="188" y="500" font-size="12" text-anchor="middle" stroke="none" fill="#666">You stay in control — nothing happens</text>
  <text x="188" y="518" font-size="12" text-anchor="middle" stroke="none" fill="#666">until you say so.</text>

  <!-- footer -->
  <g transform="translate(32,704)">
    <rect width="311" height="48" rx="4" fill="#fff" stroke="#000" />
    <path d="M104 18 h20 a4 4 0 0 1 4 4 v8 a4 4 0 0 1 -4 4 h-10 l-6 5 v-5 h-4 a4 4 0 0 1 -4 -4 v-8 a4 4 0 0 1 4 -4 z" fill="#fff" stroke="#000" />
    <text x="170" y="29" font-size="14" text-anchor="middle" stroke="none" fill="#000">Open chat with {agentName}</text>
  </g>
  <text x="188" y="780" font-size="14" text-anchor="middle" stroke="none" fill="#666">&#8592; Back</text>
</svg>

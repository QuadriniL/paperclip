<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Option A — "Meet your team lead" (introduction-framed). Desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <!-- dimmed modal overlay (app behind) -->
  <rect x="0" y="0" width="1280" height="800" fill="#e6e6e6" stroke="none" />
  <text x="24" y="32" font-size="12" stroke="none" fill="#666">Modal overlay — app dimmed behind</text>

  <!-- wizard card -->
  <g transform="translate(360,120)">
    <rect width="560" height="560" rx="8" fill="#fff" />

    <!-- close X (top-left, matches current) -->
    <g stroke="#000" stroke-width="1.5">
      <line x1="24" y1="24" x2="36" y2="36" />
      <line x1="36" y1="24" x2="24" y2="36" />
    </g>

    <!-- stepper tabs -->
    <line x1="24" y1="88" x2="536" y2="88" stroke="#000" stroke-width="1" />
    <text x="24"  y="80" font-size="12" stroke="none" fill="#666">Mission</text>
    <text x="112" y="80" font-size="12" stroke="none" fill="#666">Team lead</text>
    <text x="216" y="80" font-size="12" stroke="none" fill="#000">Meet your lead</text>
    <line x1="216" y1="88" x2="320" y2="88" stroke="#000" stroke-width="2.5" />

    <!-- hero: agent avatar (NOT a rocket) -->
    <circle cx="280" cy="172" r="44" fill="#e6e6e6" />
    <!-- simple person glyph -->
    <circle cx="280" cy="160" r="14" fill="#fff" stroke="#000" />
    <path d="M258 196 a22 22 0 0 1 44 0" fill="#fff" stroke="#000" />
    <!-- LEAD badge -->
    <rect x="232" y="216" width="96" height="22" rx="11" fill="#fff" stroke="#000" />
    <text x="280" y="231" font-size="12" text-anchor="middle" stroke="none" fill="#000">TEAM LEAD</text>

    <!-- heading -->
    <text x="280" y="282" font-size="28" text-anchor="middle" stroke="none" fill="#000">Meet {agentName}</text>
    <text x="280" y="306" font-size="12" text-anchor="middle" stroke="none" fill="#666">Your team lead · most people call this role CEO</text>

    <!-- supporting copy -->
    <text x="280" y="342" font-size="14" text-anchor="middle" stroke="none" fill="#000">{agentName} will drive your mission and help you</text>
    <text x="280" y="362" font-size="14" text-anchor="middle" stroke="none" fill="#000">decide who joins the team.</text>

    <!-- mission chip -->
    <rect x="80" y="384" width="400" height="44" rx="6" fill="#fff" stroke="#000" />
    <text x="280" y="411" font-size="14" text-anchor="middle" stroke="none" fill="#666">&#8220;{companyGoal}&#8221;</text>

    <!-- divider + next line -->
    <line x1="40" y1="456" x2="520" y2="456" stroke="#000" stroke-width="1" />
    <text x="280" y="484" font-size="12" text-anchor="middle" stroke="none" fill="#666">Next — chat with {agentName} to plan your first hires.</text>

    <!-- footer -->
    <text x="24" y="520" font-size="14" stroke="none" fill="#666">&#8592; Back</text>
    <g transform="translate(312,496)">
      <rect width="224" height="40" rx="4" fill="#fff" stroke="#000" />
      <!-- chat bubble glyph -->
      <path d="M20 14 h20 a4 4 0 0 1 4 4 v8 a4 4 0 0 1 -4 4 h-10 l-6 5 v-5 h-4 a4 4 0 0 1 -4 -4 v-8 a4 4 0 0 1 4 -4 z" fill="#fff" stroke="#000" />
      <text x="124" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#000">Start with {agentName}</text>
    </g>
  </g>
</svg>

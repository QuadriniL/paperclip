<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Option B — "Your team so far" (recap / roster summary). Desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <rect x="0" y="0" width="1280" height="800" fill="#e6e6e6" stroke="none" />
  <text x="24" y="32" font-size="12" stroke="none" fill="#666">Modal overlay — app dimmed behind</text>

  <g transform="translate(360,120)">
    <rect width="560" height="560" rx="8" fill="#fff" />

    <!-- close X -->
    <g stroke="#000" stroke-width="1.5">
      <line x1="24" y1="24" x2="36" y2="36" />
      <line x1="36" y1="24" x2="24" y2="36" />
    </g>

    <!-- stepper tabs -->
    <line x1="24" y1="88" x2="536" y2="88" stroke="#000" stroke-width="1" />
    <text x="24"  y="80" font-size="12" stroke="none" fill="#666">Mission</text>
    <text x="112" y="80" font-size="12" stroke="none" fill="#666">Team lead</text>
    <text x="216" y="80" font-size="12" stroke="none" fill="#000">Your team</text>
    <line x1="216" y1="88" x2="288" y2="88" stroke="#000" stroke-width="2.5" />

    <!-- heading -->
    <text x="280" y="132" font-size="28" text-anchor="middle" stroke="none" fill="#000">Your team is ready to plan</text>
    <text x="280" y="156" font-size="12" text-anchor="middle" stroke="none" fill="#666">Here&#8217;s what&#8217;s set up so far.</text>

    <!-- recap row 1: Mission -->
    <g transform="translate(40,184)">
      <rect width="480" height="64" rx="6" fill="#fff" stroke="#000" />
      <!-- check glyph -->
      <circle cx="36" cy="32" r="16" fill="#e6e6e6" stroke="#000" />
      <path d="M28 32 l6 6 l12 -12" fill="none" stroke="#000" stroke-width="2" />
      <text x="68" y="28" font-size="12" stroke="none" fill="#666">MISSION</text>
      <text x="68" y="46" font-size="14" stroke="none" fill="#000">{companyName} — &#8220;{companyGoal}&#8221;</text>
    </g>

    <!-- recap row 2: Team lead -->
    <g transform="translate(40,264)">
      <rect width="480" height="64" rx="6" fill="#fff" stroke="#000" />
      <circle cx="36" cy="32" r="16" fill="#e6e6e6" stroke="#000" />
      <path d="M28 32 l6 6 l12 -12" fill="none" stroke="#000" stroke-width="2" />
      <text x="68" y="28" font-size="12" stroke="none" fill="#666">TEAM LEAD</text>
      <text x="68" y="46" font-size="14" stroke="none" fill="#000">{agentName} · ready to work</text>
      <!-- member count chip -->
      <rect x="376" y="20" width="88" height="24" rx="12" fill="#fff" stroke="#000" />
      <text x="420" y="36" font-size="12" text-anchor="middle" stroke="none" fill="#666">1 member</text>
    </g>

    <!-- recap row 3: Next -->
    <g transform="translate(40,344)">
      <rect width="480" height="64" rx="6" fill="#fff" stroke="#000" stroke-dasharray="4 4" />
      <!-- empty/next glyph -->
      <circle cx="36" cy="32" r="16" fill="#fff" stroke="#000" stroke-dasharray="3 3" />
      <text x="36" y="38" font-size="18" text-anchor="middle" stroke="none" fill="#666">+</text>
      <text x="68" y="28" font-size="12" stroke="none" fill="#666">UP NEXT</text>
      <text x="68" y="46" font-size="14" stroke="none" fill="#000">Plan who joins the team with {agentName}.</text>
    </g>

    <!-- footer -->
    <text x="24" y="520" font-size="14" stroke="none" fill="#666">&#8592; Back</text>
    <g transform="translate(296,496)">
      <rect width="240" height="40" rx="4" fill="#fff" stroke="#000" />
      <path d="M20 14 h20 a4 4 0 0 1 4 4 v8 a4 4 0 0 1 -4 4 h-10 l-6 5 v-5 h-4 a4 4 0 0 1 -4 -4 v-8 a4 4 0 0 1 4 -4 z" fill="#fff" stroke="#000" />
      <text x="132" y="25" font-size="14" text-anchor="middle" stroke="none" fill="#000">Plan your team &#8594;</text>
    </g>
  </g>
</svg>

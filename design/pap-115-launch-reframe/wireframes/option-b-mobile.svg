<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Option B mobile — recap rows stack. 375x812 -->
  <rect x="0" y="0" width="375" height="812" />

  <g stroke="#000" stroke-width="1.5">
    <line x1="24" y1="32" x2="36" y2="44" />
    <line x1="36" y1="32" x2="24" y2="44" />
  </g>

  <line x1="24" y1="96" x2="351" y2="96" stroke="#000" stroke-width="1" />
  <text x="24"  y="88" font-size="12" stroke="none" fill="#666">Mission</text>
  <text x="104" y="88" font-size="12" stroke="none" fill="#666">Lead</text>
  <text x="160" y="88" font-size="12" stroke="none" fill="#000">Your team</text>
  <line x1="160" y1="96" x2="232" y2="96" stroke="#000" stroke-width="2.5" />

  <text x="32" y="148" font-size="28" stroke="none" fill="#000">Your team is</text>
  <text x="32" y="180" font-size="28" stroke="none" fill="#000">ready to plan</text>
  <text x="32" y="204" font-size="12" stroke="none" fill="#666">Here&#8217;s what&#8217;s set up so far.</text>

  <!-- row 1 Mission -->
  <g transform="translate(32,232)">
    <rect width="311" height="72" rx="6" fill="#fff" stroke="#000" />
    <circle cx="36" cy="36" r="16" fill="#e6e6e6" stroke="#000" />
    <path d="M28 36 l6 6 l12 -12" fill="none" stroke="#000" stroke-width="2" />
    <text x="68" y="32" font-size="12" stroke="none" fill="#666">MISSION</text>
    <text x="68" y="52" font-size="14" stroke="none" fill="#000">{companyName}</text>
  </g>

  <!-- row 2 Team lead -->
  <g transform="translate(32,320)">
    <rect width="311" height="72" rx="6" fill="#fff" stroke="#000" />
    <circle cx="36" cy="36" r="16" fill="#e6e6e6" stroke="#000" />
    <path d="M28 36 l6 6 l12 -12" fill="none" stroke="#000" stroke-width="2" />
    <text x="68" y="32" font-size="12" stroke="none" fill="#666">TEAM LEAD · 1 member</text>
    <text x="68" y="52" font-size="14" stroke="none" fill="#000">{agentName} · ready to work</text>
  </g>

  <!-- row 3 Next -->
  <g transform="translate(32,408)">
    <rect width="311" height="72" rx="6" fill="#fff" stroke="#000" stroke-dasharray="4 4" />
    <circle cx="36" cy="36" r="16" fill="#fff" stroke="#000" stroke-dasharray="3 3" />
    <text x="36" y="42" font-size="18" text-anchor="middle" stroke="none" fill="#666">+</text>
    <text x="68" y="32" font-size="12" stroke="none" fill="#666">UP NEXT</text>
    <text x="68" y="52" font-size="14" stroke="none" fill="#000">Plan who joins, with {agentName}.</text>
  </g>

  <!-- footer -->
  <g transform="translate(32,704)">
    <rect width="311" height="48" rx="4" fill="#fff" stroke="#000" />
    <path d="M112 18 h20 a4 4 0 0 1 4 4 v8 a4 4 0 0 1 -4 4 h-10 l-6 5 v-5 h-4 a4 4 0 0 1 -4 -4 v-8 a4 4 0 0 1 4 -4 z" fill="#fff" stroke="#000" />
    <text x="172" y="29" font-size="14" text-anchor="middle" stroke="none" fill="#000">Plan your team &#8594;</text>
  </g>
  <text x="188" y="780" font-size="14" text-anchor="middle" stroke="none" fill="#666">&#8592; Back</text>
</svg>

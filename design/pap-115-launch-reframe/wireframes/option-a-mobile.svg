<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- Option A mobile — full-bleed wizard sheet. 375x812 -->
  <rect x="0" y="0" width="375" height="812" />

  <!-- close X -->
  <g stroke="#000" stroke-width="1.5">
    <line x1="24" y1="32" x2="36" y2="44" />
    <line x1="36" y1="32" x2="24" y2="44" />
  </g>

  <!-- stepper tabs -->
  <line x1="24" y1="96" x2="351" y2="96" stroke="#000" stroke-width="1" />
  <text x="24"  y="88" font-size="12" stroke="none" fill="#666">Mission</text>
  <text x="104" y="88" font-size="12" stroke="none" fill="#666">Lead</text>
  <text x="160" y="88" font-size="12" stroke="none" fill="#000">Meet lead</text>
  <line x1="160" y1="96" x2="240" y2="96" stroke="#000" stroke-width="2.5" />

  <!-- avatar -->
  <circle cx="188" cy="192" r="48" fill="#e6e6e6" />
  <circle cx="188" cy="178" r="15" fill="#fff" stroke="#000" />
  <path d="M165 220 a23 23 0 0 1 46 0" fill="#fff" stroke="#000" />
  <rect x="140" y="240" width="96" height="22" rx="11" fill="#fff" stroke="#000" />
  <text x="188" y="255" font-size="12" text-anchor="middle" stroke="none" fill="#000">TEAM LEAD</text>

  <!-- heading -->
  <text x="188" y="312" font-size="28" text-anchor="middle" stroke="none" fill="#000">Meet {agentName}</text>
  <text x="188" y="336" font-size="12" text-anchor="middle" stroke="none" fill="#666">Your team lead · a.k.a. CEO</text>

  <text x="188" y="376" font-size="14" text-anchor="middle" stroke="none" fill="#000">{agentName} drives your mission and</text>
  <text x="188" y="396" font-size="14" text-anchor="middle" stroke="none" fill="#000">helps decide who joins the team.</text>

  <!-- mission chip -->
  <rect x="32" y="424" width="311" height="48" rx="6" fill="#fff" stroke="#000" />
  <text x="188" y="453" font-size="14" text-anchor="middle" stroke="none" fill="#666">&#8220;{companyGoal}&#8221;</text>

  <line x1="32" y1="504" x2="343" y2="504" stroke="#000" stroke-width="1" />
  <text x="188" y="536" font-size="12" text-anchor="middle" stroke="none" fill="#666">Next — chat with {agentName} to plan hires.</text>

  <!-- footer (stacked, full-width CTA) -->
  <g transform="translate(32,704)">
    <rect width="311" height="48" rx="4" fill="#fff" stroke="#000" />
    <path d="M120 18 h20 a4 4 0 0 1 4 4 v8 a4 4 0 0 1 -4 4 h-10 l-6 5 v-5 h-4 a4 4 0 0 1 -4 -4 v-8 a4 4 0 0 1 4 -4 z" fill="#fff" stroke="#000" />
    <text x="178" y="29" font-size="14" text-anchor="middle" stroke="none" fill="#000">Start with {agentName}</text>
  </g>
  <text x="188" y="780" font-size="14" text-anchor="middle" stroke="none" fill="#666">&#8592; Back</text>
</svg>
